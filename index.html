<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tôi Đọc, AI Viết</title>
<meta name="description" content="Blog kỹ thuật — chia sẻ về lập trình và công nghệ.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e5e5e5;
    --code-bg: #f6f6f6;
    --link: #0b6bcb;
  }
  [data-theme="dark"] {
    --bg: #121212;
    --fg: #e4e4e4;
    --muted: #9a9a9a;
    --border: #2a2a2a;
    --code-bg: #1e1e1e;
    --link: #6db3f2;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
  }
  a { color: var(--link); }

  .layout {
    display: flex;
    min-height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    padding: 3rem 2rem 2rem;
    text-align: right;
  }
  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: var(--code-bg);
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    overflow: hidden;
    margin-bottom: 1.2rem;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .site-title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin: 0 0 0.4rem;
  }
  .site-title a { color: var(--fg); text-decoration: none; }
  .byline {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .bio {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.7;
    margin: 0 0 1.5rem;
  }
  .sidebar-divider {
    display: inline-block;
    width: 90px;
    border: none;
    border-top: 3px solid var(--fg);
    margin: 0 0 1.5rem;
  }
  .sidebar-links { list-style: none; margin: 0; padding: 0; }
  .sidebar-links li { margin-bottom: 0.7rem; }
  .sidebar-links a {
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 3px;
    font-size: 0.95rem;
  }
  .sidebar-links a:hover { color: var(--link); }
  .theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 1.1rem;
    padding: 0;
    line-height: 1;
  }
  .theme-toggle:hover { opacity: 0.7; }

  /* ---------- Main ---------- */
  .main {
    flex: 1;
    padding: 3rem 3rem 4rem;
    min-width: 0;
  }

  /* Home: danh sách nhiều cột */
  .post-columns {
    column-width: 340px;
    column-gap: 3.5rem;
  }
  .entry {
    break-inside: avoid;
    margin-bottom: 1.4rem;
  }
  .entry-meta {
    font-size: 0.82rem;
    color: var(--muted);
  }
  .entry-meta .date { margin-right: 0.6rem; }
  .entry-meta a.tag {
    color: var(--muted);
    text-decoration: none;
  }
  .entry-meta a.tag:hover { color: var(--link); text-decoration: underline; }
  .entry-title {
    margin: 0.1rem 0 0;
    font-size: 1.02rem;
    font-weight: 400;
    line-height: 1.45;
  }
  .entry-title a { color: var(--link); text-decoration: none; }
  .entry-title a:hover { text-decoration: underline; text-underline-offset: 3px; }

  .tag-filter-bar {
    margin-bottom: 2rem;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .tag-filter-bar a { color: var(--link); }

  /* ---------- Bài viết chi tiết: ẩn sidebar, căn giữa ---------- */
  .layout.post-view .sidebar { display: none; }
  .layout.post-view .main {
    max-width: 700px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
  }
  .post-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3rem;
  }
  .post-header .home-link {
    color: var(--fg);
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .post-header nav { display: flex; gap: 1rem; align-items: baseline; }
  .post-header nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
  }
  .post-header nav a:hover { color: var(--fg); }
  .article-wrap { max-width: 680px; }
  article h1 {
    font-size: 1.7rem;
    line-height: 1.3;
    letter-spacing: -0.02em;
    margin: 0 0 0.4rem;
  }
  .post-meta {
    font-size: 0.85rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    align-items: baseline;
    margin-bottom: 2.5rem;
  }
  .post-meta a.tag { color: var(--muted); text-decoration: none; }
  .post-meta a.tag:hover { color: var(--link); text-decoration: underline; }
  article { font-size: 17px; line-height: 1.7; }
  article h2 { font-size: 1.3rem; margin-top: 2.2rem; letter-spacing: -0.01em; }
  article h3 { font-size: 1.1rem; margin-top: 1.8rem; }
  article img { max-width: 100%; height: auto; }
  article a { color: var(--link); text-underline-offset: 3px; }
  article blockquote {
    margin: 1.5rem 0;
    padding: 0 0 0 1.25rem;
    border-left: 3px solid var(--border);
    color: var(--muted);
  }
  article hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
  article table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.9rem;
    margin: 1.5rem 0;
  }
  article th, article td {
    border: 1px solid var(--border);
    padding: 0.45rem 0.7rem;
    text-align: left;
  }
  code {
    font-family: "SF Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 0.85em;
    background: var(--code-bg);
    padding: 0.15em 0.4em;
    border-radius: 4px;
  }
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.2rem;
    overflow-x: auto;
    line-height: 1.55;
    margin: 1.5rem 0;
  }
  pre code { background: none; padding: 0; font-size: 0.82rem; }
  .back-link {
    display: inline-block;
    margin-bottom: 2rem;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back-link:hover { color: var(--link); }
  .status-msg { color: var(--muted); }

  /* ---------- Responsive ---------- */
  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      text-align: center;
      padding: 2rem 1.25rem 0;
    }
    .sidebar-divider { margin-bottom: 1rem; }
    .sidebar-links li { display: inline-block; margin: 0 0.6rem 0.5rem; }
    .main { padding: 2rem 1.25rem 3rem; }
  }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <!-- Ảnh đại diện: thay bằng <img src="avatar.jpg"> khi có ảnh -->
    <div class="avatar" aria-hidden="true">🎩</div>
    <h1 class="site-title"><a href="#/">Tôi Đọc, AI Viết</a></h1>
    <div class="byline">by Gavin</div>
    <p class="bio">Internet có quá nhiều thứ để đọc, thôi thì vào đây mình chọn lọc cho rồi =)).</p>
    <hr class="sidebar-divider">
    <ul class="sidebar-links">
      <!-- Sửa href="#" thành link thật -->
      <li><a href="#">RSS</a></li>
      <li><a href="#">Facebook</a></li>
      <li><a href="#">Github</a></li>
      <li><a href="#">Một số blog hay nên đọc</a></li>
      <li><a href="#">☕ Buy me a coffee</a></li>
      <li><button class="theme-toggle" aria-label="Chuyển giao diện sáng/tối">🌙</button></li>
    </ul>
  </aside>

  <main class="main" id="app"><p class="status-msg">Đang tải…</p></main>

</div>

<script>
(function () {
  'use strict';

  var POSTS_URL = 'posts/posts.json';
  var app = document.getElementById('app');
  var postsCache = null;
  var mdCache = {}; // slug -> Promise<string> nội dung markdown

  /* ---------- Theme (🌙 = chuyển sang tối, 💡 = chuyển sang sáng) ---------- */
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btns = document.querySelectorAll('.theme-toggle');
    for (var i = 0; i < btns.length; i++) {
      btns[i].textContent = theme === 'dark' ? '💡' : '🌙';
    }
  }
  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') || 'light';
  }
  function initTheme() {
    var saved = localStorage.getItem('theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(theme);
  }
  // Delegation: hoạt động với mọi nút .theme-toggle, kể cả nút render sau
  document.addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('.theme-toggle') : null;
    if (!btn) return;
    var next = currentTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  });
  initTheme();

  /* ---------- Data ---------- */
  function loadPosts() {
    if (postsCache) return Promise.resolve(postsCache);
    return fetch(POSTS_URL)
      .then(function (r) {
        if (!r.ok) throw new Error('Không tải được danh sách bài viết');
        return r.json();
      })
      .then(function (data) {
        data.sort(function (a, b) { return b.date.localeCompare(a.date); });
        postsCache = data;
        return data;
      });
  }

  // dd-mm-yyyy như ảnh mẫu
  function formatDate(iso) {
    var p = iso.split('-');
    return p[2] + '-' + p[1] + '-' + p[0];
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function tagLinks(tags) {
    return (tags || []).map(function (t) {
      return '<a class="tag" href="#/tag/' + encodeURIComponent(t) + '">' + esc(t) + '</a>';
    }).join(', ');
  }

  var layout = document.querySelector('.layout');

  /* ---------- Trang chủ: danh sách nhiều cột ---------- */
  function renderList(filterTag) {
    layout.classList.remove('post-view');
    loadPosts().then(function (posts) {
      var filtered = filterTag
        ? posts.filter(function (p) { return (p.tags || []).indexOf(filterTag) !== -1; })
        : posts;

      var html = '';
      if (filterTag) {
        html += '<div class="tag-filter-bar">Tag “' + esc(filterTag) +
                '” (' + filtered.length + ') · <a href="#/">xem tất cả</a></div>';
      }
      if (filtered.length === 0) {
        html += '<p class="status-msg">Chưa có bài viết nào.</p>';
      } else {
        html += '<div class="post-columns">';
        filtered.forEach(function (p) {
          html += '<div class="entry">' +
            '<div class="entry-meta"><span class="date">' + formatDate(p.date) + '</span>' +
            tagLinks(p.tags) + '</div>' +
            '<h2 class="entry-title"><a href="#/post/' + encodeURIComponent(p.slug) + '">' +
            esc(p.title) + '</a></h2>' +
            '</div>';
        });
        html += '</div>';
      }
      app.innerHTML = html;
      document.title = 'Tôi Đọc, AI Viết';
      window.scrollTo(0, 0);
    }).catch(showError);
  }

  /* ---------- Bài viết chi tiết ---------- */
  // Cache + dedupe: fetch mỗi file .md đúng 1 lần
  function fetchMd(post) {
    if (!mdCache[post.slug]) {
      mdCache[post.slug] = fetch('posts/' + post.file).then(function (r) {
        if (!r.ok) {
          delete mdCache[post.slug]; // lỗi thì bỏ cache để thử lại lần sau
          throw new Error('Không tải được bài viết');
        }
        return r.text();
      });
    }
    return mdCache[post.slug];
  }

  function renderPost(slug) {
    loadPosts().then(function (posts) {
      var post = posts.filter(function (p) { return p.slug === slug; })[0];
      if (!post) {
        layout.classList.add('post-view');
        app.innerHTML = '<p class="status-msg">Không tìm thấy bài viết. <a href="#/">Về trang chủ</a></p>';
        return;
      }
      return fetchMd(post)
        .then(function (md) {
          // Bỏ frontmatter nếu có
          md = md.replace(/^---[\s\S]*?---\s*/, '');
          // Bỏ H1 đầu tiên nếu trùng tiêu đề (tránh lặp)
          md = md.replace(/^#\s+.*\n/, '');
          var body = marked.parse(md);
          // Đổi layout và nội dung trong cùng 1 frame — không còn flash
          layout.classList.add('post-view');
          app.innerHTML =
            '<div class="post-header">' +
            '<a class="home-link" href="#/">Opus Learning</a>' +
            '<button class="theme-toggle" aria-label="Chuyển giao diện sáng/tối">' +
            (currentTheme() === 'dark' ? '💡' : '🌙') + '</button></nav>' +
            '</div>' +
            '<div class="article-wrap">' +
            '<a class="back-link" href="#/">← Tất cả bài viết</a>' +
            '<article>' +
            '<h1>' + esc(post.title) + '</h1>' +
            '<div class="post-meta"><span>' + formatDate(post.date) + '</span>' + tagLinks(post.tags) + '</div>' +
            body +
            '</article></div>';
          document.title = post.title + ' · Gavin';
          window.scrollTo(0, 0);
        });
    }).catch(showError);
  }

  function showError(err) {
    app.innerHTML = '<p class="status-msg">Lỗi: ' + esc(err.message) +
      '.<br>Lưu ý: trang cần chạy qua HTTP (GitHub Pages hoặc <code>python3 -m http.server</code>), không mở trực tiếp file.</p>';
  }

  /* ---------- Prefetch: tải trước .md khi hover/chạm vào link bài viết ---------- */
  function prefetchFromLink(target) {
    var a = target.closest ? target.closest('a[href^="#/post/"]') : null;
    if (!a) return;
    var slug = decodeURIComponent(a.getAttribute('href').slice('#/post/'.length));
    loadPosts().then(function (posts) {
      var post = posts.filter(function (p) { return p.slug === slug; })[0];
      if (post) fetchMd(post).catch(function () {}); // lỗi prefetch thì bỏ qua
    });
  }
  document.addEventListener('mouseover', function (e) { prefetchFromLink(e.target); });
  document.addEventListener('touchstart', function (e) { prefetchFromLink(e.target); }, { passive: true });

  /* ---------- Router ---------- */
  function route() {
    var hash = location.hash.replace(/^#\/?/, '');
    var parts = hash.split('/');
    if (parts[0] === 'post' && parts[1]) {
      renderPost(decodeURIComponent(parts[1]));
    } else if (parts[0] === 'tag' && parts[1]) {
      renderList(decodeURIComponent(parts[1]));
    } else {
      renderList(null);
    }
  }
  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
